  placeholderName: "Tvoje jméno / podpis"
  submitButtonText: "Poslat zprávu"
  sendingText: "Odesílám..."
  successMessage: "Vzkaz byl úspěšně odeslán do naší mývalí schránky! Děkujeme."
  errorMessage: "Chyba při odesílání. Zkuste to prosím znovu."
