name: Deploy Wedding Website

on:
  push:
    branches:
      - main # Spustí se při každém pushnutí do větve main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Krok: Stažení kódu z repozitáře
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Krok: Nastavení Node.js prostředí
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Odpovídá požadavku v package.json (>=22.12.0)

      # 3. Krok: Instalace závislostí a sestavení Astro webu
      - name: Install dependencies and Build
        env:
          PUBLIC_GOOGLE_SCRIPT_URL: ${{ secrets.PUBLIC_GOOGLE_SCRIPT_URL }}
        run: |
          npm ci
          npm run build

      # 4. Krok: Nahrání vygenerovaných souborů na VPS přes rsync
      - name: Deploy to VPS
        uses: Burnett01/rsync-deployments@5.2.1
        with:
          switches: -avzr --delete
          path: dist/ # Složka, kterou vygenerovalo Astro
          remote_path: /var/www/mywalove/svatba/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USERNAME }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      # 5. Krok: Nahrání dashboard skriptu na VPS
      - name: Deploy Dashboard Script to VPS
        uses: Burnett01/rsync-deployments@5.2.1
        with:
          switches: -avzr
          path: update_dashboard.py
          remote_path: /opt/svatba-dashboard/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USERNAME }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

